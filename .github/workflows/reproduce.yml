name: reproduce

on:
  push:
  pull_request:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: pin BLAS threads for byte-determinism
        run: |
          echo "OMP_NUM_THREADS=1"      >> $GITHUB_ENV
          echo "OPENBLAS_NUM_THREADS=1" >> $GITHUB_ENV
          echo "MKL_NUM_THREADS=1"      >> $GITHUB_ENV
          echo "PYTHONHASHSEED=0"       >> $GITHUB_ENV

      - name: report environment
        run: |
          python -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"
          python -c "import numpy as np; np.show_config()" || true

      - name: regenerate data and run tests
        run: python scripts/reproduce.py

      - name: report manifest drift (informational only)
        run: |
          if git diff --quiet data/manifest.json; then
            echo "manifest matches committed reference (byte-exact)"
          else
            echo "manifest drifted from committed reference. Diff:"
            git --no-pager diff --no-color data/manifest.json
            echo
            echo "This is reported but does NOT fail CI. Cross-machine byte-"
            echo "determinism is not achievable for this codebase: numpy.fft"
            echo "and LAPACK reduction order vary across Linux CI runs even"
            echo "with single-thread OpenBLAS. The committed manifest is a"
            echo "fingerprint of one specific build (see README); the"
            echo "structural reproduction (every script runs, every test"
            echo "passes) is what this job actually verifies."
          fi
