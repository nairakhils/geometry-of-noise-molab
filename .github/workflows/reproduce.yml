name: reproduce

on:
  push:
  pull_request:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: pin BLAS threads for byte-determinism
        run: |
          echo "OMP_NUM_THREADS=1"      >> $GITHUB_ENV
          echo "OPENBLAS_NUM_THREADS=1" >> $GITHUB_ENV
          echo "MKL_NUM_THREADS=1"      >> $GITHUB_ENV
          echo "PYTHONHASHSEED=0"       >> $GITHUB_ENV

      - name: report environment
        run: |
          python -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"
          python -c "import numpy as np; np.show_config()" || true

      - name: regenerate data and run tests
        run: python scripts/reproduce.py

      - name: show manifest diff (informational; soft-fail)
        run: git diff --no-color data/manifest.json || true

      - name: assert manifest matches committed reference
        run: git diff --exit-code data/manifest.json
